<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803d" />
    <meta name="description" content="Calculadora fitosanitaria: conversión de dosis, prescripción y plan de tratamiento" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgroCalc" />
    <link rel="icon" type="image/png" href="/ConversorUnidades/icon-192.png" />
    <link rel="apple-touch-icon" href="/ConversorUnidades/icon-192.png" />
    <link rel="manifest" href="/ConversorUnidades/manifest.json" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/ConversorUnidades/sw.js')
            .catch(() => {}); // silencioso si falla en dev
        });
      }
    </script>
  </body>
</html>
